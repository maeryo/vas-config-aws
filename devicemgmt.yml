  rabbitmq:
    host: 10.178.143.162
    username: pubService
    password: '!!pubpub!!'
    port: 5672
    virtualHost: vas
  datasource:
    url: jdbc:postgresql://10.178.143.175:5432/aiden_cloud
    username: visionai
    password: '!skcc1234'
  cloud:
    stream:
      defaultBinder: kafka
      kafka:
        binder:
          brokers: 10.178.143.172:9092, 10.178.143.173:9092, 10.178.143.187:9092
          configuration:
            auto:
              offset:
                reset: latest
            key:
              deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value:
              deserializer: org.apache.kafka.common.serialization.StringDeserializer
            request:
              timeout:
                ms: 60000
            retries: 3
      bindings:
        vasHubControlPub:
          destination: vas_hub_control
          contentType: application/json
        vasHubControlSub:
          destination: vas_hub_control
          contentType: application/json

graphql:
  tools:
      introspectionEnabled: false
  servlet:
    mapping: /graphql
    exceptionHandlersEnabled: true
    enabled: true
    corsEnabled: true
    cors:
      allowed-origins: '*'
    websocket:
        enabled: false

logging:
