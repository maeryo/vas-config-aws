uri:
  event-mgmt: http://10.233.2.161:18083
    
server:
  compression:
    enabled: true
    mimeTypes: application/json, application/xml, text/html, text/xml, text/plain, application/gzip
  port: 8082

netty:
  tcpPort: 3500
  bossCount: 1
  workerCount: 10
  keepAlive: true
  backlog: 100
  readTimeout: 60

spring:
  jackson:
    serialization:
      indent-output: true

